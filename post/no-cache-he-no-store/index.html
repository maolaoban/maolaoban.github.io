          <h2 class="post-title">no-cache和no-store</h2>
          <div class="post-info post-detail-info">
            <span><i class="icon-calendar-outline"></i> 2021-04-08</span>
            
          </div>
          <div class="post-content">
            <p><code>no-cache</code> 和 <code>no-store</code> 用作控制缓存，被服务器通过响应头 <code>Cache-Control</code>传递给客户端</p>
<h2 id="no-store"><strong><code>no-store</code></strong></h2>
<p><strong>「永远都不要在客户端存储资源」</strong>，每次永远都要从原始服务器获取资源</p>
<h2 id="no-cache"><strong><code>no-cache</code></strong></h2>
<p>可以在客户端存储资源，但每次都**「必须去服务器做新鲜度校验」**，来决定从服务器获取最新资源 (200) 还是从客户端读取缓存 (304)，即所谓的协商缓存</p>
