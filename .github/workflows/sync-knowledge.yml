name: Sync Knowledge to Blog

on:
  repository_dispatch:
    types: [sync-knowledge]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout blog repo
        uses: actions/checkout@v4
        with:
          path: blog

      - name: Checkout knowledge repo
        uses: actions/checkout@v4
        with:
          repository: maolaoban/knowledge
          path: knowledge

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sync and convert files
        run: node blog/scripts/sync-knowledge.mjs
        env:
          KNOWLEDGE_DIR: knowledge
          BLOG_DIR: blog/src/data/blog

      - name: Check for changes
        id: changes
        working-directory: blog
        run: git diff --quiet src/data/blog/ || echo "has_changes=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.has_changes == 'true'
        working-directory: blog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/blog/ .sync-state.json
          git commit -m "sync: 更新 knowledge 知识库文章"
          git push
